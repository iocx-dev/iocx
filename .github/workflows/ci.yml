name: CI

on:
  push:
    branches: [ feature/scaffold-repo ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Install dev tools
      run: |
        pip install pytest ruff black coverage pip-audit bandit

    - name: Lint (ruff)
      run: ruff check iocx

    - name: Format check (black)
      run: black --check iocx

    - name: Run tests
      run: pytest -q

    - name: Security scan (pip-audit)
      run: |
        pip-audit --skip-editable || true

    - name: Security scan (Bandit)
      run: |
        bandit -r iocx -lll
