[project]
name = "malx-ioc-extractor"
version = "0.1.0"
description = "Static IOC extraction engine for binaries, text, and logs."
authors = [
    { name = "MalX Labs" }
]
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }

dependencies = [
    "pefile",
    "rich",
]

[project.scripts]
malx-ioc-extractor = "malx_ioc_extractor.cli.main:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
